name: PyScrape->Groq->Firebase

on:
  workflow_dispatch:
    inputs:
      specs_url:
        description: "Please enter the specs URL to scrape"
        required: true
        type: string

jobs:
  process:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # -----------------------------
      # PYTHON SETUP
      # -----------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install cloudscraper lxml

      # -----------------------------
      # RUN SCRAPER
      # -----------------------------
      - name: Run scraper
        run: |
          python app/components/scraper.py "${{ github.event.inputs.specs_url }}" > scraped.json

          echo "===== SCRAPED DATA ====="
          cat scraped.json

      # -----------------------------
      # GROQ TRANSFORMATION
      # -----------------------------
      - name: Groq Transform
        run: |
          SCRAPED=$(jq -c . scraped.json)
          DATA=$(jq -c . scraped.json)
          echo "===== INPUT TO GROQ ====="
          echo "$DATA"
          
          RESPONSE_1=$(curl -s -X POST "https://api.groq.com/openai/v1/chat/completions" \
            -H "Authorization: Bearer ${{ secrets.GROQ_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "groq/compound-mini",
              "messages": [
                {
                  "role": "user",
                    \"content\": \"STRICT_MODE=TRUE; Convert the given smartphone specification into Firestore REST API compatible JSON. Use ROOT key 'fields'. Every field must use google.firestore.v1.Value wrapper using stringValue. Do NOT remove information, reorganize it logically into fields like model, display, cpu, battery, ram, storage, rearCamera, frontCamera, connectivity etc. Also add a short dynamic signature sentence at the end of 'expertRating' so the content does not appear copied. Return ONLY valid Firestore JSON. Input data: $DATA"
                }
              ]
            }')
          echo "$RESPONSE" | jq -r '.choices[0].message.content | fromjson' > mobileData.json

          echo "===== TRANSFORMED FIRESTORE JSON ====="
          cat mobileData.json

      # -----------------------------
      # AUTHENTICATE GCP
      # -----------------------------
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          token_format: access_token

      # -----------------------------
      # GENERATE DOC ID
      # -----------------------------
      - name: Generate document id
        id: doc
        run: |
          URL="${{ github.event.inputs.specs_url }}"
          DOC=$(basename "$URL" | cut -d'-' -f1-3)
          DOC_ID=$(echo "$DOC" | sed 's/ /%20/g')
          echo "doc_id=$DOC_ID" >> $GITHUB_OUTPUT

      # -----------------------------
      # UPLOAD TO FIRESTORE
      # -----------------------------
      - name: Upload to Firestore
        run: |
          curl -s -w "\nHTTP %{http_code}\n" \
            -X PATCH \
            "https://firestore.googleapis.com/v1/projects/site-9686c/databases/(default)/documents/${{ github.ref_name }}/${{ steps.doc.outputs.doc_id }}" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.access_token }}" \
            -H "Content-Type: application/json" \
            --data-binary @mobileData.json
